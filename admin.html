<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADMIN PANEL</title>

<style>

body{
background:#0b0f19;
color:white;
font-family:Inter;
margin:0;
}

.sidebar{
width:230px;
background:#121826;
height:100vh;
position:fixed;
padding:20px;
}

.menu{
margin-bottom:15px;
cursor:pointer;
padding:10px;
border-radius:6px;
background:#0f172a;
}

.menu:hover{
background:#00ffc3;
color:black;
}

.main{
margin-left:250px;
padding:30px;
}

.card{
background:#121826;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
background:#0b0f19;
border:1px solid #333;
color:white;
}

button{
padding:10px;
background:#00ffc3;
border:none;
cursor:pointer;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #333;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>ADMIN</h2>

<div class="menu" onclick="view('dashboard')">Dashboard</div>
<div class="menu" onclick="view('products')">Products</div>
<div class="menu" onclick="view('users')">Users</div>
<div class="menu" onclick="view('keys')">Keys</div>
<div class="menu" onclick="view('stats')">Revenue</div>

</div>

<div class="main">

<div id="dashboard">

<div class="card">
<h2>Dashboard</h2>

<div id="statsBox"></div>

</div>

</div>

<div id="products" style="display:none">

<div class="card">

<h2>Add Product</h2>

<input id="pname" placeholder="name">
<input id="pprice" placeholder="price">
<input id="pdesc" placeholder="description">
<input id="pimg" placeholder="image url">
<input id="pguide" placeholder="guide link">

<button onclick="addProduct()">ADD</button>

</div>

<div class="card">

<h2>Product List</h2>

<table id="productTable"></table>

</div>

</div>

<div id="users" style="display:none">

<div class="card">

<h2>User List</h2>

<table id="userTable"></table>

</div>

</div>

<div id="keys" style="display:none">

<div class="card">

<h2>Key Manager</h2>

<table id="keyTable"></table>

</div>

</div>

<div id="stats" style="display:none">

<div class="card">

<h2>Revenue</h2>

<div id="revenue"></div>

</div>

</div>

</div>

<script>

const API="YOUR_API_LINK"

function view(v){

document.querySelectorAll(".main>div")
.forEach(e=>e.style.display="none")

document.getElementById(v).style.display="block"

}

async function addProduct(){

let name=document.getElementById("pname").value
let price=document.getElementById("pprice").value
let desc=document.getElementById("pdesc").value
let img=document.getElementById("pimg").value
let guide=document.getElementById("pguide").value

await fetch(API+`?action=adminAddProduct&name=${name}&price=${price}&desc=${desc}&image=${img}&guide=${guide}`)

alert("added")

}

</script>

</body>
</html>
