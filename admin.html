<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XWorld | Admin Control Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body { margin: 0; font-family: 'Inter', sans-serif; background: #0b0f19; color: #e2e8f0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar { width: 260px; background: #121826; border-right: 1px solid rgba(0, 255, 195, 0.1); padding: 20px; display: flex; flex-direction: column; overflow-y: auto;}
        .logo { font-size: 24px; font-weight: 800; color: #00ffc3; margin-bottom: 40px; text-shadow: 0 0 10px rgba(0,255,195,0.3); letter-spacing: 1px; }
        .nav-item { padding: 12px 15px; color: #94a3b8; text-decoration: none; border-radius: 8px; margin-bottom: 10px; font-weight: 600; transition: 0.3s; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: rgba(0, 255, 195, 0.1); color: #00ffc3; }
        
        /* MAIN CONTENT */
        .main-content { flex: 1; padding: 30px 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px;}
        .header-title { font-size: 24px; font-weight: 800; color: white; }

        /* STAT CARDS */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: #121826; border-radius: 12px; padding: 25px; border: 1px solid rgba(0,255,200,0.1); box-shadow: 0 0 20px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: #00ffc3; box-shadow: 0 0 15px #00ffc3; }
        .card h3 { margin: 0 0 10px 0; color: #94a3b8; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .card .value { font-size: 32px; font-weight: 800; color: white; }

        /* CONTROLS (Search & Export) */
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #121826; padding: 15px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); flex-wrap: wrap; gap: 10px;}
        .search-box { display: flex; gap: 10px; flex: 1; min-width: 250px;}
        input[type="text"] { flex: 1; background: #0b0f19; border: 1px solid #334155; color: white; padding: 12px 15px; border-radius: 8px; font-size: 14px; outline: none; transition: 0.3s; }
        input[type="text"]:focus { border-color: #00ffc3; box-shadow: 0 0 10px rgba(0,255,195,0.2); }
        
        .btn { padding: 12px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; border: none; font-size: 14px; white-space: nowrap;}
        .btn-primary { background: #00ffc3; color: #000; }
        .btn-primary:hover { box-shadow: 0 0 15px rgba(0,255,195,0.4); }
        .btn-secondary { background: #334155; color: white; }
        .btn-secondary:hover { background: #475569; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); padding: 8px 12px; font-size: 12px; border-radius: 6px; cursor: pointer;}
        .btn-danger:hover { background: #ef4444; color: white; }

        /* TABLE */
        .table-container { background: #121826; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); overflow-x: auto; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px;}
        th, td { padding: 15px 20px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { background: #0b0f19; color: #94a3b8; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        tr:hover { background: rgba(255,255,255,0.02); }
        .user-name { font-weight: 600; color: white; }
        .user-bal { color: #00ffc3; font-family: monospace; font-size: 15px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .badge-active { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16,185,129,0.2); }

        /* PAGINATION */
        .pagination { display: flex; justify-content: flex-end; align-items: center; gap: 15px; color: #94a3b8; font-size: 14px; flex-wrap: wrap;}
        .page-btn { background: #1e293b; border: 1px solid #334155; color: white; padding: 8px 15px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .page-btn:hover:not(:disabled) { background: #334155; color: #00ffc3; border-color: #00ffc3; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #loading { text-align: center; padding: 40px; color: #00ffc3; font-style: italic; display: none; }

        /* Reponsive cho Mobile */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto;}
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid rgba(0, 255, 195, 0.1); padding: 15px;}
            .main-content { padding: 15px; overflow-y: visible;}
            .controls { flex-direction: column; align-items: stretch; }
            .search-box { width: 100%; margin-bottom: 10px;}
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">ADMIN.IO</div>
        <div class="nav-item active">👥 Users Management</div>
        <div class="nav-item" onclick="alert('Tính năng đang cập nhật!')">🔑 Keys Management</div>
        <div class="nav-item" onclick="alert('Tính năng đang cập nhật!')">💳 Transactions</div>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="header-title">Users Management</div>
            <div style="color: #94a3b8;">Welcome back, Administrator</div>
        </div>

        <div class="stats-grid">
            <div class="card">
                <h3>Total Users</h3>
                <div class="value" id="statTotalUsers">0</div>
            </div>
            <div class="card">
                <h3>Total Revenue</h3>
                <div class="value" id="statTotalRev" style="color: #00ffc3;">0 ₫</div>
            </div>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Tìm kiếm theo Username..." onkeyup="handleSearch()">
                <button class="btn btn-secondary" onclick="loadData()">Làm mới</button>
            </div>
            <button class="btn btn-primary" onclick="exportCSV()">⬇️ Xuất CSV</button>
        </div>

        <div class="table-container">
            <div id="loading">Đang lấy dữ liệu từ máy chủ...</div>
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Balance</th>
                        <th>Created Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="5" style="text-align:center; padding: 30px; color: #64748b;">Vui lòng chờ...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="pagination">
            <span id="pageInfo">Showing 0 to 0 of 0 entries</span>
            <div>
                <button class="page-btn" id="btnPrev" onclick="prevPage()">Prev</button>
                <button class="page-btn" id="btnNext" onclick="nextPage()">Next</button>
            </div>
        </div>

    </div>

    <script>
        // ⚠️ THAY LINK API CỦA BẠN VÀO ĐÂY (GIỮ NGUYÊN /exec, KHÔNG THÊM TOKEN)
        const API_URL = "LINK_API_CUA_BAN_O_DAY";
        const ADMIN_PASS = "ADMIN_SECRET_123"; // Khớp với mật khẩu trong code Google Script
        
        let allUsers = []; 
        let filteredUsers = []; 
        let currentPage = 1;
        const rowsPerPage = 10;

        window.onload = loadData;

        async function loadData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('tableBody').innerHTML = '';
            
            try {
                let res = await fetch(`${API_URL}?action=admin_users&admin_pass=${ADMIN_PASS}`);
                let json = await res.json();
                
                if (json.status === 'success') {
                    allUsers = json.data || [];
                    filteredUsers = [...allUsers];
                    updateStats();
                    currentPage = 1;
                    renderTable();
                } else {
                    alert("Lỗi: " + (json.message || "Không thể tải dữ liệu"));
                }
            } catch (e) {
                alert("Lỗi kết nối đến Máy chủ! Vui lòng kiểm tra lại Link API.");
            }
            document.getElementById('loading').style.display = 'none';
        }

        function updateStats() {
            document.getElementById('statTotalUsers').innerText = allUsers.length;
            let totalRev = allUsers.reduce((sum, user) => sum + (Number(user.balance) || 0), 0);
            document.getElementById('statTotalRev').innerText = totalRev.toLocaleString() + " ₫";
        }

        function handleSearch() {
            let keyword = document.getElementById('searchInput').value.toLowerCase();
            filteredUsers = allUsers.filter(u => u.user.toLowerCase().includes(keyword));
            currentPage = 1;
            renderTable();
        }

        function renderTable() {
            let start = (currentPage - 1) * rowsPerPage;
            let end = start + rowsPerPage;
            let paginatedData = filteredUsers.slice(start, end);
            
            let html = "";
            if (paginatedData.length === 0) {
                html = '<tr><td colspan="5" style="text-align:center; padding: 30px; color: #64748b;">Không tìm thấy người dùng nào.</td></tr>';
            } else {
                paginatedData.forEach(u => {
                    let dateStr = u.created ? new Date(u.created).toLocaleDateString('vi-VN') : "N/A";
                    let statusHtml = u.status === 'banned' 
                        ? '<span class="badge" style="background:rgba(239,68,68,0.1); color:#ef4444; border:1px solid rgba(239,68,68,0.2);">Banned</span>'
                        : '<span class="badge badge-active">Active</span>';
                        
                    html += `
                    <tr>
                        <td class="user-name">${u.user}</td>
                        <td class="user-bal">${(Number(u.balance) || 0).toLocaleString()} ₫</td>
                        <td style="color: #94a3b8; font-size: 14px;">${dateStr}</td>
                        <td>${statusHtml}</td>
                        <td>
                            <button class="btn-danger" onclick="banUser('${u.user}')">Khóa Tài Khoản</button>
                        </td>
                    </tr>`;
                });
            }
            
            document.getElementById('tableBody').innerHTML = html;
            updatePaginationInfo();
        }

        function updatePaginationInfo() {
            let totalPages = Math.ceil(filteredUsers.length / rowsPerPage);
            let startItem = filteredUsers.length === 0 ? 0 : ((currentPage - 1) * rowsPerPage) + 1;
            let endItem = Math.min(currentPage * rowsPerPage, filteredUsers.length);
            
            document.getElementById('pageInfo').innerText = `Đang hiện ${startItem} đến ${endItem} (Tổng ${filteredUsers.length})`;
            
            document.getElementById('btnPrev').disabled = currentPage === 1;
            document.getElementById('btnNext').disabled = currentPage === totalPages || totalPages === 0;
        }

        function prevPage() { if (currentPage > 1) { currentPage--; renderTable(); } }
        function nextPage() { 
            let totalPages = Math.ceil(filteredUsers.length / rowsPerPage);
            if (currentPage < totalPages) { currentPage++; renderTable(); } 
        }

        function exportCSV() {
            if (filteredUsers.length === 0) return alert("Không có dữ liệu để xuất!");
            
            let csvContent = "Username,Balance,Created Date,Status\n";
            filteredUsers.forEach(u => {
                let dateStr = u.created ? new Date(u.created).toLocaleDateString('vi-VN') : "N/A";
                let userSafe = `"${u.user}"`;
                let status = u.status || "active";
                csvContent += `${userSafe},${u.balance},"${dateStr}","${status}"\n`;
            });
            
            let blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            let link = document.createElement("a");
            let url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `XWorld_Users_${new Date().toISOString().slice(0,10)}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        async function banUser(targetUser) {
            if(!confirm(`⚠️ NGUY HIỂM: Bạn có chắc chắn muốn KHÓA VĨNH VIỄN tài khoản: ${targetUser} không?`)) return;
            
            try {
                let res = await fetch(`${API_URL}?action=admin_ban&target=${targetUser}&admin_pass=${ADMIN_PASS}`);
                let json = await res.json();
                
                if(json.status === 'success') {
                    alert(`✅ Đã khóa thành công tài khoản: ${targetUser}`);
                    loadData(); 
                } else {
                    alert("❌ Lỗi: " + json.message);
                }
            } catch (e) {
                alert("❌ Lỗi kết nối đến máy chủ.");
            }
        }
    </script>
</body>
</html>
