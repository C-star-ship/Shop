<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XWorld Shop - Pro</title>
    <style>
        body { font-family: sans-serif; background: #f4f5f9; margin: 0; overflow-x: hidden; }
        .navbar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: bold; color: #1877f2; text-decoration: none; }
        .hamburger { font-size: 24px; cursor: pointer; border: none; background: none; }

        /* Sidebar */
        .sidebar { position: fixed; top: 0; right: -300px; width: 280px; height: 100vh; background: #0b1120; color: white; z-index: 1000; transition: 0.3s; padding-top: 20px; }
        .sidebar.active { right: 0; }
        .menu-list { list-style: none; padding: 0; }
        .menu-list a { display: block; padding: 15px 20px; color: #e2e8f0; text-decoration: none; border-bottom: 1px solid #1e293b; }
        .btn-auth-menu { background: #1877f2; color: white; border: none; padding: 15px; width: 90%; margin: 0 5% 20px 5%; border-radius: 8px; font-weight: bold; }

        /* Product Cards */
        .product-grid { display: grid; gap: 20px; padding: 20px; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .product-img { height: 180px; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .product-info { padding: 15px; }
        .price { color: #ea580c; font-size: 20px; font-weight: bold; }
        .btn-buy { width: 100%; padding: 12px; background: #0f172a; color: white; border: none; border-radius: 6px; margin-top: 10px; font-weight: bold; }

        /* Auth & Deposit */
        .view-section { display: none; padding: 20px; }
        .view-section.active { display: block; }
        .auth-box { background: white; padding: 25px; border-radius: 12px; max-width: 400px; margin: auto; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab-btn { flex: 1; padding: 10px; background: none; border: none; font-weight: bold; color: #666; cursor: pointer; }
        .tab-btn.active { color: #1877f2; border-bottom: 2px solid #1877f2; }
        .input-group { position: relative; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .eye { position: absolute; right: 10px; top: 10px; cursor: pointer; font-size: 20px; }
        .deposit-box { background: #fff3cd; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #ffeeba; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo">🔒 XWorld Shop</a>
        <button class="hamburger" onclick="toggleMenu()">☰</button>
    </nav>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <button class="btn-auth-menu" id="menuAuthBtn" onclick="goAuth()">Đăng Nhập / Đăng Ký</button>
        <ul class="menu-list">
            <li><a href="#" onclick="switchView('home')">Trang chủ</a></li>
            <li><a href="#" onclick="switchView('home')">Danh sách shop</a></li>
            <li><a href="#" onclick="goDeposit()">Nạp tiền</a></li>
            <li><a href="#" onclick="alert('Đang phát triển')">Lịch sử đơn hàng</a></li>
            <li><a href="#" onclick="alert('Liên hệ: @admin')">Liên hệ admin</a></li>
            <li id="logoutLi" style="display:none"><a href="#" onclick="location.reload()" style="color:red">Đăng xuất</a></li>
        </ul>
    </div>

    <div id="view-home" class="view-section active">
        <div class="product-grid">
            <div class="product-card">
                <div class="product-img">📦</div>
                <div class="product-info">
                    <h3>Gói VIP 1 Ngày</h3>
                    <div class="price">10.000đ</div>
                    <button class="btn-buy" onclick="buy(1)">Mua Ngay</button>
                </div>
            </div>
            <div class="product-card">
                <div class="product-img">🚀</div>
                <div class="product-info">
                    <h3>Gói VIP 7 Ngày</h3>
                    <div class="price">70.000đ</div>
                    <button class="btn-buy" onclick="buy(7)">Mua Ngay</button>
                </div>
            </div>
        </div>
    </div>

    <div id="view-auth" class="view-section">
        <div class="auth-box">
            <div class="tabs">
                <button class="tab-btn active" id="tLogin" onclick="setTab('login')">Đăng nhập</button>
                <button class="tab-btn" id="tReg" onclick="setTab('register')">Đăng ký</button>
            </div>
            <div id="fLogin">
                <input type="text" id="lUser" placeholder="Tên tài khoản"><br><br>
                <div class="input-group">
                    <input type="password" id="lPass" placeholder="Mật khẩu">
                    <span class="eye" onclick="tog('lPass')">👁️</span>
                </div><br>
                <button class="btn-auth-menu" style="width:100%; margin:0" onclick="doLogin()">Đăng Nhập</button>
            </div>
            <div id="fReg" style="display:none">
                <input type="text" id="rUser" placeholder="Tên tài khoản mới"><br><br>
                <div class="input-group">
                    <input type="password" id="rPass" placeholder="Mật khẩu (8+ ký tự, chữ & số)">
                    <span class="eye" onclick="tog('rPass')">👁️</span>
                </div><br>
                <input type="password" id="rConf" placeholder="Xác nhận mật khẩu"><br><br>
                <button class="btn-auth-menu" style="width:100%; margin:0; background:#42b72a" onclick="doReg()">Tạo Tài Khoản</button>
            </div>
        </div>
    </div>

    <div id="view-deposit" class="view-section">
        <div class="deposit-box">
            <h3>💳 QUÉT MÃ NẠP TIỀN</h3>
            <div style="background:white; padding:10px; display:inline-block; border-radius:10px;">
                <img id="qrImg" src="" style="width:200px">
            </div>
            <p>Nội dung tự động: <b style="color:red" id="memo"></b></p>
            <button class="btn-auth-menu" style="width:auto; padding:10px 20px" onclick="refresh()">🔄 Cập nhật số dư</button>
        </div>
    </div>

    <script>
        const API = "LINK_API_CUA_BAN_O_DAY";
        let user = "", pass = "", bal = 0;

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
        function switchView(v) { document.querySelectorAll('.view-section').forEach(s=>s.classList.remove('active')); document.getElementById('view-'+v).classList.add('active'); toggleMenu(); }
        function setTab(t) { 
            document.getElementById('fLogin').style.display = t=='login'?'block':'none';
            document.getElementById('fReg').style.display = t=='reg'?'block':'none';
            document.getElementById('tLogin').classList.toggle('active', t=='login');
            document.getElementById('tReg').classList.toggle('active', t=='reg');
        }
        function tog(id) { let i = document.getElementById(id); i.type = i.type=='password'?'text':'password'; }

        async function doLogin() {
            let u = document.getElementById('lUser').value, p = document.getElementById('lPass').value;
            let res = await fetch(`${API}?action=login&user=${u}&pass=${p}`);
            let d = await res.json();
            if(d.status=='success') {
                user=u; pass=p; bal=d.balance;
                document.getElementById('menuAuthBtn').innerHTML = `👤 ${u}<br>💰 ${bal.toLocaleString()}đ`;
                document.getElementById('logoutLi').style.display='block';
                switchView('home');
            } else alert(d.message);
        }

        async function doReg() {
            let u = document.getElementById('rUser').value, p = document.getElementById('rPass').value, c = document.getElementById('rConf').value;
            if(p.length<8 || !/[0-9]/.test(p) || p!=c) return alert("Mật khẩu không hợp lệ hoặc không khớp!");
            let res = await fetch(`${API}?action=register&user=${u}&pass=${p}`);
            let d = await res.json();
            if(d.status=='success') { alert("Đăng ký xong! Hãy đăng nhập."); setTab('login'); } else alert(d.message);
        }

        function goDeposit() {
            if(!user) return switchView('auth');
            let m = "NAP " + user.toUpperCase();
            document.getElementById('qrImg').src = `https://img.vietqr.io/image/MB-0364675622-compact.png?addInfo=${encodeURIComponent(m)}`;
            document.getElementById('memo').innerText = m;
            switchView('deposit');
        }

        async function buy(days) {
            if(!user) return switchView('auth');
            if(!confirm(`Mua ${days} ngày?`)) return;
            let res = await fetch(`${API}?action=buy&user=${user}&pass=${pass}&days=${days}`);
            let d = await res.json();
            if(d.status=='success') { bal=d.new_balance; document.getElementById('menuAuthBtn').innerHTML = `👤 ${user}<br>💰 ${bal.toLocaleString()}đ`; prompt("Key của bạn:", d.key); } else alert(d.message);
        }

        async function refresh() {
            let res = await fetch(`${API}?action=login&user=${user}&pass=${pass}`);
            let d = await res.json();
            if(d.status=='success') { bal=d.balance; document.getElementById('menuAuthBtn').innerHTML = `👤 ${user}<br>💰 ${bal.toLocaleString()}đ`; alert("Đã cập nhật!"); }
        }
        function goAuth() { toggleMenu(); switchView('auth'); }
    </script>
</body>
</html>
